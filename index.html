<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FFXIV Savage Quiz Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0f14;
        --surface: #151820;
        --border: #252a35;
        --gold: #c9a84c;
        --gold-dim: #8a6f30;
        --blue: #4a7fa5;
        --blue-glow: #5b9dc740;
        --red: #b04040;
        --text: #d8d4cc;
        --text-dim: #7a7870;
        --white: #f0ede8;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }

      /* Subtle background texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse 60% 40% at 50% 0%, #1a2035 0%, transparent 70%), repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff03 40px);
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 680px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      /* Header */
      header {
        text-align: center;
      }

      .eyebrow {
        font-family: "Inter", sans-serif;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--gold-dim);
        margin-bottom: 0.6rem;
      }

      h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        font-weight: 900;
        color: var(--white);
        letter-spacing: 0.04em;
        line-height: 1.1;
      }

      h1 span {
        color: var(--gold);
      }

      .divider {
        width: 120px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
        margin: 1rem auto 0;
      }

      .subtitle {
        font-size: 0.85rem;
        color: var(--text-dim);
        margin-top: 0.75rem;
        letter-spacing: 0.03em;
      }

      /* Quiz cards */
      .cards {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
      }

      .card {
        display: block;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1.5rem 1.75rem;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.15s;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--gold-dim);
        transition: background 0.2s;
      }

      .card:hover {
        border-color: var(--gold);
        box-shadow:
          0 0 24px var(--blue-glow),
          0 2px 8px #00000080;
        transform: translateY(-2px);
      }

      .card:hover::before {
        background: var(--gold);
      }

      .card-top {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        margin-bottom: 0.4rem;
      }

      .card-tier {
        font-family: "Cinzel", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--gold);
        letter-spacing: 0.06em;
      }

      .card-badge {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--bg);
        background: var(--gold-dim);
        padding: 0.2em 0.55em;
        border-radius: 3px;
      }

      .card-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.3rem;
      }

      .card-desc {
        font-size: 0.8rem;
        color: var(--text-dim);
        line-height: 1.5;
      }

      .card-arrow {
        position: absolute;
        right: 1.5rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gold-dim);
        font-size: 1.2rem;
        transition:
          color 0.2s,
          right 0.2s;
      }

      .card:hover .card-arrow {
        color: var(--gold);
        right: 1.2rem;
      }

      /* Footer */
      footer {
        font-size: 0.72rem;
        color: var(--text-dim);
        text-align: center;
        letter-spacing: 0.04em;
      }

      footer a {
        color: var(--gold-dim);
        text-decoration: none;
      }

      footer a:hover {
        color: var(--gold);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <p class="eyebrow">Arcadion Raid Series</p>
        <h1>
          FFXIV
          <span>Savage</span>
          Quizzes
        </h1>
        <div class="divider"></div>
        <p class="subtitle">Practice mechanics for your static. Pick a fight.</p>
      </header>

      <div class="cards">
        <a class="card" href="./M11S/index.html">
          <div class="card-top">
            <span class="card-tier">M11S</span>
            <span class="card-badge">Savage</span>
          </div>

          <span class="card-arrow">›</span>
        </a>

        <a class="card" href="./M12S/index.html">
          <div class="card-top">
            <span class="card-tier">M12S</span>
            <span class="card-badge">Savage</span>
          </div>

          <span class="card-arrow">›</span>
        </a>
      </div>

      <footer>
        Built for the Riset static &nbsp;·&nbsp;
        <a href="https://github.com/ikena-iea/FFXIV-Quizzes" target="_blank">github</a>
      </footer>
    </div>
  </body>
</html>
